name: OCI VM Launch (Auto-retry)
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli
      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/key.pem << 'EOF'
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config
          oci --version
      - name: Check existing VM
        id: check
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --all \
            --query "length(data[?\"display-name\"=='fillsa-vm' && \"lifecycle-state\"!='TERMINATED'])" \
            --raw-output 2>/dev/null)
          echo "Found fillsa-vm (non-terminated): '${COUNT:-0}'"
          if [ "${COUNT:-0}" = "0" ]; then
            echo "exists=no" >> "$GITHUB_OUTPUT"
          else
            echo "exists=yes" >> "$GITHUB_OUTPUT"
          fi
      - name: Launch VM
        if: steps.check.outputs.exists == 'no'
        id: launch
        run: |
          set +e
          RESULT=$(oci compute instance launch \
            --availability-domain "${{ secrets.OCI_AD_NAME }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 1, "memoryInGBs": 6}' \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --assign-public-ip true \
            --display-name "fillsa-vm" \
            --metadata "{\"ssh_authorized_keys\": \"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"}" \
            --wait-for-state RUNNING 2>&1)
          EXIT=$?
          echo "$RESULT"
          if [ $EXIT -eq 0 ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          elif echo "$RESULT" | grep -qi "out of host capacity\|out of capacity\|timed out\|RequestException\|TooManyRequests\|ServiceUnavailable\|InternalError"; then
            echo "status=retry" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi
      - name: Report retryable failure
        if: steps.launch.outputs.status == 'retry'
        run: |
          echo "::warning::Capacity shortage or transient error. Will retry next run."
          exit 1
      - name: Report unknown error
        if: steps.launch.outputs.status == 'error'
        run: |
          echo "::error::VM launch failed with an unexpected error."
          exit 1
      - name: Get public IP
        if: steps.launch.outputs.status == 'success'
        run: |
          INSTANCE_ID=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_ID }}" \
            --lifecycle-state RUNNING --all \
            --query "data[?\"display-name\"=='fillsa-vm'].id | [0]" \
            --raw-output)
          sleep 10
          PUBLIC_IP=$(oci compute instance list-vnics \
            --instance-id "$INSTANCE_ID" \
            --query 'data[0]."public-ip"' --raw-output)
          echo "================================"
          echo "VM created! Public IP: $PUBLIC_IP"
          echo "================================"
          echo "## VM created" >> "$GITHUB_STEP_SUMMARY"
          echo "- Public IP: \`$PUBLIC_IP\`" >> "$GITHUB_STEP_SUMMARY"
